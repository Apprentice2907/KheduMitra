name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-asyncio
        pip install -r requirements.txt
        
    - name: Lint with Ruff
      run: |
        ruff check app ml scripts tests
        
    - name: Verify Intent Classifier Artifact
      run: |
        python -c "import pickle; pickle.load(open('models/intent_classifier.pkl','rb'))"
        
    - name: Run Pytest
      run: |
        pytest tests/
